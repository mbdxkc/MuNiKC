<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <defs>
    <linearGradient id="sandwich-plate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="bun-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="bun-shine" cx="30%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#FAF9F6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="300" fill="#0D0D0D"/>

  <!-- Plate shadow -->
  <ellipse cx="102" cy="245" rx="94" ry="28" fill="#FAF9F6" opacity="0.05"/>

  <!-- Plate - full width -->
  <ellipse cx="100" cy="220" rx="96" ry="38" fill="none" stroke="#FAF9F6" stroke-opacity="0.38" stroke-width="2.5"/>
  <ellipse cx="100" cy="220" rx="86" ry="32" fill="url(#sandwich-plate)"/>
  <ellipse cx="100" cy="220" rx="74" ry="25" fill="none" stroke="#FAF9F6" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Sandwich - bottom bun -->
  <path d="M25 175 Q25 192 100 198 Q175 192 175 175 L175 166 Q175 158 100 152 Q25 158 25 166 Z"
        fill="#FAF9F6" fill-opacity="0.2" stroke="#FAF9F6" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- Fillings layers -->
  <path d="M30 152 L170 152" stroke="#FAF9F6" stroke-opacity="0.32" stroke-width="7" stroke-linecap="round"/>
  <path d="M35 142 L165 142" stroke="#FAF9F6" stroke-opacity="0.24" stroke-width="6" stroke-linecap="round"/>
  <path d="M38 132 L162 132" stroke="#FAF9F6" stroke-opacity="0.18" stroke-width="5" stroke-linecap="round"/>
  <path d="M42 124 L158 124" stroke="#FAF9F6" stroke-opacity="0.12" stroke-width="4" stroke-linecap="round"/>

  <!-- Lettuce peeking out -->
  <path d="M18 148 Q32 138 48 150" stroke="#FAF9F6" stroke-opacity="0.25" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M22 155 Q38 145 52 156" stroke="#FAF9F6" stroke-opacity="0.18" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M152 148 Q168 135 182 146" stroke="#FAF9F6" stroke-opacity="0.25" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M148 155 Q165 143 180 153" stroke="#FAF9F6" stroke-opacity="0.18" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Top bun -->
  <path d="M25 120 Q25 75 100 62 Q175 75 175 120 Q175 130 100 135 Q25 130 25 120 Z"
        fill="url(#bun-top)" stroke="#FAF9F6" stroke-opacity="0.32" stroke-width="2"/>

  <!-- Bun shine -->
  <ellipse cx="70" cy="90" rx="35" ry="20" fill="url(#bun-shine)"/>

  <!-- Bun highlight -->
  <path d="M48 95 Q78 80 125 88" stroke="#FAF9F6" stroke-opacity="0.25" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Sesame seeds -->
  <ellipse cx="60" cy="95" rx="4" ry="2" fill="#FAF9F6" fill-opacity="0.32" transform="rotate(-20 60 95)"/>
  <ellipse cx="85" cy="82" rx="4" ry="2" fill="#FAF9F6" fill-opacity="0.28" transform="rotate(10 85 82)"/>
  <ellipse cx="110" cy="78" rx="4" ry="2" fill="#FAF9F6" fill-opacity="0.3" transform="rotate(-5 110 78)"/>
  <ellipse cx="138" cy="88" rx="4" ry="2" fill="#FAF9F6" fill-opacity="0.25" transform="rotate(15 138 88)"/>
  <ellipse cx="75" cy="102" rx="3.5" ry="1.8" fill="#FAF9F6" fill-opacity="0.22" transform="rotate(-8 75 102)"/>
  <ellipse cx="125" cy="95" rx="3.5" ry="1.8" fill="#FAF9F6" fill-opacity="0.2" transform="rotate(12 125 95)"/>
  <ellipse cx="100" cy="72" rx="3" ry="1.5" fill="#FAF9F6" fill-opacity="0.18" transform="rotate(-15 100 72)"/>

  <!-- Side - fries -->
  <rect x="25" y="208" width="28" height="6" rx="2" fill="#FAF9F6" fill-opacity="0.22" transform="rotate(-22 39 211)"/>
  <rect x="18" y="218" width="25" height="6" rx="2" fill="#FAF9F6" fill-opacity="0.18" transform="rotate(-38 30 221)"/>
  <rect x="28" y="222" width="22" height="6" rx="2" fill="#FAF9F6" fill-opacity="0.15" transform="rotate(-12 39 225)"/>
  <rect x="35" y="212" width="20" height="5" rx="2" fill="#FAF9F6" fill-opacity="0.12" transform="rotate(-48 45 214)"/>
  <rect x="22" y="228" width="18" height="5" rx="2" fill="#FAF9F6" fill-opacity="0.1" transform="rotate(-5 31 230)"/>
</svg>
