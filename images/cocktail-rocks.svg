<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <defs>
    <linearGradient id="rocks-liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#A0A0A0" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="rocks-glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FAF9F6" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#FAF9F6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="rocks-ice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F6" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#FAF9F6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="rocks-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FAF9F6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="300" fill="#0D0D0D"/>


  <!-- Rocks glass - wider, shorter -->
  <path d="M45 120 L55 230 Q55 245 70 245 L130 245 Q145 245 145 230 L155 120 Z"
        fill="url(#rocks-glass)" stroke="#FAF9F6" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- Glass bottom thickness -->
  <ellipse cx="100" cy="238" rx="38" ry="6" fill="#FAF9F6" opacity="0.08"/>

  <!-- Liquid -->
  <path d="M52 140 L58 225 Q58 235 70 235 L130 235 Q142 235 142 225 L148 140 Z"
        fill="url(#rocks-liquid)"/>

  <!-- Ice cubes - packed full -->
  <rect x="62" y="142" width="30" height="26" rx="4" fill="url(#rocks-ice)" transform="rotate(-6 77 155)"/>
  <rect x="96" y="140" width="32" height="28" rx="4" fill="url(#rocks-ice)" transform="rotate(7 112 154)"/>
  <rect x="58" y="170" width="28" height="24" rx="4" fill="url(#rocks-ice)" transform="rotate(10 72 182)"/>
  <rect x="90" y="168" width="30" height="26" rx="4" fill="url(#rocks-ice)" transform="rotate(-5 105 181)"/>
  <rect x="120" y="172" width="24" height="22" rx="4" fill="url(#rocks-ice)" transform="rotate(8 132 183)"/>
  <rect x="65" y="196" width="26" height="22" rx="4" fill="url(#rocks-ice)" transform="rotate(-8 78 207)"/>
  <rect x="95" y="194" width="28" height="24" rx="4" fill="url(#rocks-ice)" transform="rotate(4 109 206)"/>
  <rect x="125" y="198" width="20" height="18" rx="4" fill="url(#rocks-ice)" transform="rotate(-10 135 207)"/>

  <!-- Ice highlights -->
  <rect x="65" y="145" width="14" height="2" rx="1" fill="#FAF9F6" opacity="0.4" transform="rotate(-6 72 146)"/>
  <rect x="99" y="143" width="16" height="2" rx="1" fill="#FAF9F6" opacity="0.35" transform="rotate(7 107 144)"/>
  <rect x="62" y="173" width="12" height="2" rx="1" fill="#FAF9F6" opacity="0.3" transform="rotate(10 68 174)"/>
  <rect x="93" y="171" width="14" height="2" rx="1" fill="#FAF9F6" opacity="0.25" transform="rotate(-5 100 172)"/>

  <!-- Glass highlight -->
  <path d="M52 125 L58 220" stroke="#FAF9F6" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Big thick orange peel twist -->
  <path d="M130 115 Q145 108 152 120 Q158 135 148 142 Q138 148 132 138"
        fill="none" stroke="#FAF9F6" stroke-opacity="0.5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Peel inner edge highlight -->
  <path d="M133 118 Q144 113 149 122 Q154 133 146 138"
        fill="none" stroke="#FAF9F6" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round"/>
  <!-- Peel curl end -->
  <path d="M132 138 Q125 145 130 155 Q138 162 145 155"
        fill="none" stroke="#FAF9F6" stroke-opacity="0.4" stroke-width="5" stroke-linecap="round"/>
</svg>
