<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <defs>
    <linearGradient id="collins-liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#A0A0A0" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="collins-glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FAF9F6" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#FAF9F6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="ice-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="300" fill="#0D0D0D"/>


  <!-- Collins glass body -->
  <path d="M60 70 L65 250 Q65 260 75 260 L125 260 Q135 260 135 250 L140 70 Z"
        fill="url(#collins-glass)" stroke="#FAF9F6" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Liquid -->
  <path d="M63 90 L67 245 Q67 252 75 252 L125 252 Q133 252 133 245 L137 90 Z"
        fill="url(#collins-liquid)"/>

  <!-- Ice cubes - packed full -->
  <rect x="72" y="95" width="24" height="22" rx="3" fill="url(#ice-shine)" transform="rotate(-5 84 106)"/>
  <rect x="100" y="92" width="22" height="24" rx="3" fill="url(#ice-shine)" transform="rotate(8 111 104)"/>
  <rect x="75" y="120" width="22" height="20" rx="3" fill="url(#ice-shine)" transform="rotate(-8 86 130)"/>
  <rect x="102" y="118" width="20" height="22" rx="3" fill="url(#ice-shine)" transform="rotate(6 112 129)"/>
  <rect x="78" y="145" width="20" height="18" rx="3" fill="url(#ice-shine)" transform="rotate(10 88 154)"/>
  <rect x="100" y="142" width="22" height="20" rx="3" fill="url(#ice-shine)" transform="rotate(-5 111 152)"/>
  <rect x="74" y="168" width="18" height="18" rx="3" fill="url(#ice-shine)" transform="rotate(-12 83 177)"/>
  <rect x="96" y="165" width="20" height="20" rx="3" fill="url(#ice-shine)" transform="rotate(8 106 175)"/>
  <rect x="80" y="190" width="18" height="16" rx="3" fill="url(#ice-shine)" transform="rotate(5 89 198)"/>
  <rect x="102" y="188" width="18" height="18" rx="3" fill="url(#ice-shine)" transform="rotate(-7 111 197)"/>
  <rect x="85" y="210" width="16" height="16" rx="3" fill="url(#ice-shine)" transform="rotate(-3 93 218)"/>
  <rect x="105" y="212" width="16" height="14" rx="3" fill="url(#ice-shine)" transform="rotate(6 113 219)"/>

  <!-- Glass highlight -->
  <path d="M65 75 L67 240" stroke="#FAF9F6" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Bamboo pick -->
  <line x1="115" y1="55" x2="155" y2="105" stroke="#FAF9F6" stroke-opacity="0.5" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pick point -->
  <path d="M155 105 L159 112 L154 109 Z" fill="#FAF9F6" fill-opacity="0.4"/>
  <!-- Pick top knob -->
  <ellipse cx="114" cy="54" rx="3.5" ry="5" fill="#FAF9F6" fill-opacity="0.45" transform="rotate(-40 114 54)"/>
  <!-- Bamboo segments -->
  <line x1="122" y1="64" x2="126" y2="67" stroke="#FAF9F6" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="133" y1="77" x2="137" y2="80" stroke="#FAF9F6" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="144" y1="90" x2="148" y2="93" stroke="#FAF9F6" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Garnish - citrus wheel on pick -->
  <circle cx="130" cy="80" r="15" fill="none" stroke="#FAF9F6" stroke-opacity="0.4" stroke-width="2"/>
  <circle cx="130" cy="80" r="10" fill="none" stroke="#FAF9F6" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="130" cy="80" r="5" fill="#FAF9F6" fill-opacity="0.15"/>
  <line x1="130" y1="65" x2="130" y2="95" stroke="#FAF9F6" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="115" y1="80" x2="145" y2="80" stroke="#FAF9F6" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="119" y1="69" x2="141" y2="91" stroke="#FAF9F6" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="141" y1="69" x2="119" y2="91" stroke="#FAF9F6" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Straw -->
  <rect x="108" y="50" width="4" height="120" rx="2" fill="#FAF9F6" opacity="0.3"/>
</svg>
