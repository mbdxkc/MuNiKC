<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <defs>
    <linearGradient id="bowl-interior" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#888888" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="bowl-rim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FAF9F6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#FAF9F6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="bowl-contents" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FAF9F6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0.05"/>
    </radialGradient>
    <radialGradient id="bowl-shine" cx="25%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#FAF9F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="300" fill="#0D0D0D"/>

  <!-- Bowl shadow -->
  <ellipse cx="102" cy="235" rx="88" ry="22" fill="#FAF9F6" opacity="0.05"/>

  <!-- Bowl body - full width -->
  <path d="M8 100 Q8 220 100 230 Q192 220 192 100 Q192 80 100 80 Q8 80 8 100 Z"
        fill="url(#bowl-interior)" stroke="#FAF9F6" stroke-opacity="0.3" stroke-width="2"/>

  <!-- Bowl rim -->
  <ellipse cx="100" cy="90" rx="92" ry="22" fill="url(#bowl-rim)" stroke="#FAF9F6" stroke-opacity="0.4" stroke-width="2.5"/>

  <!-- Bowl shine -->
  <ellipse cx="60" cy="130" rx="40" ry="50" fill="url(#bowl-shine)"/>

  <!-- Contents surface -->
  <ellipse cx="100" cy="105" rx="78" ry="18" fill="url(#bowl-contents)"/>

  <!-- Contents texture - noodles/rice -->
  <path d="M35 100 Q60 112 90 100 Q125 90 155 105 Q172 112 175 105" stroke="#FAF9F6" stroke-opacity="0.18" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M30 115 Q58 128 92 115 Q130 104 162 118 Q178 126 182 118" stroke="#FAF9F6" stroke-opacity="0.14" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M38 130 Q70 145 105 130 Q140 118 168 132" stroke="#FAF9F6" stroke-opacity="0.1" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M45 145 Q80 158 110 145 Q145 132 160 148" stroke="#FAF9F6" stroke-opacity="0.08" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Steam wisps -->
  <path d="M65 65 Q58 48 68 35" stroke="#FAF9F6" stroke-opacity="0.2" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M100 58 Q94 38 108 25" stroke="#FAF9F6" stroke-opacity="0.18" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M135 65 Q142 45 132 30" stroke="#FAF9F6" stroke-opacity="0.15" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Bowl highlight -->
  <path d="M22 115 Q35 180 85 210" stroke="#FAF9F6" stroke-opacity="0.25" stroke-width="2.5" fill="none"/>

  <!-- Garnish on top -->
  <ellipse cx="120" cy="100" rx="10" ry="5" fill="#FAF9F6" fill-opacity="0.2" transform="rotate(-12 120 100)"/>
  <circle cx="75" cy="108" r="5" fill="#FAF9F6" fill-opacity="0.18"/>
  <circle cx="145" cy="110" r="4" fill="#FAF9F6" fill-opacity="0.15"/>

  <!-- Chopsticks -->
  <line x1="155" y1="60" x2="185" y2="140" stroke="#FAF9F6" stroke-opacity="0.3" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="162" y1="58" x2="190" y2="135" stroke="#FAF9F6" stroke-opacity="0.25" stroke-width="2.5" stroke-linecap="round"/>
</svg>
